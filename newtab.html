<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новая вкладка</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <button id="settings-btn" class="settings-btn" title="Настройки" aria-label="Настройки">⚙</button>

  <main class="dial">
    <nav id="tabs" class="tabs"></nav>
    <ul id="grid" class="grid"></ul>
  </main>

  <!-- Шаблон плитки сайта -->
  <template id="tile-template">
    <li class="tile" draggable="true">
      <a class="tile__link" href="#">
        <span class="tile__favicon"></span>
        <span class="tile__title"></span>
      </a>
    </li>
  </template>

  <!-- Контекстное меню (правый клик) -->
  <nav id="context-menu" class="ctx" hidden>
    <button type="button" class="ctx__item ctx__bg-only" data-action="add">Добавить сайт</button>
    <button type="button" class="ctx__item ctx__bg-only" data-action="create-group">Создать группу</button>
    <button type="button" class="ctx__item ctx__tile-only" data-action="edit">Редактировать</button>
    <div class="ctx__item ctx__tile-only ctx__has-sub" data-action="move">
      <span>Переместить в группу</span><span>▸</span>
      <div id="ctx-move-sub" class="ctx__submenu"></div>
    </div>
    <button type="button" class="ctx__item ctx__tile-only" data-action="remove">Удалить</button>
    <button type="button" class="ctx__item ctx__tab-only" data-action="rename-group">Переименовать группу</button>
    <button type="button" class="ctx__item ctx__tab-only" data-action="delete-group">Удалить группу</button>
  </nav>

  <!-- Диалог добавления/редактирования -->
  <dialog id="dialog" class="dialog">
    <form id="dialog-form" method="dialog" class="dialog__form">
      <h2 id="dialog-title" class="dialog__heading">Добавить сайт</h2>
      <label class="dialog__field">
        <span>Название</span>
        <input id="field-title" type="text" placeholder="Например, GitHub" required maxlength="40">
      </label>
      <label class="dialog__field">
        <span>Адрес (URL)</span>
        <input id="field-url" type="url" placeholder="https://github.com" required>
      </label>
      <label class="dialog__field">
        <span>Группа</span>
        <select id="field-group"></select>
      </label>
      <div class="dialog__field">
        <span>Иконка</span>
        <div id="icon-choices" class="icon-choices"></div>
      </div>
      <div class="dialog__buttons">
        <button type="button" id="dialog-cancel" class="btn btn--ghost">Отмена</button>
        <button type="submit" class="btn btn--primary">Сохранить</button>
      </div>
    </form>
  </dialog>

  <!-- Диалог создания/переименования группы -->
  <dialog id="group-dialog" class="dialog">
    <form id="group-form" method="dialog" class="dialog__form">
      <h2 id="group-dialog-title" class="dialog__heading">Новая группа</h2>
      <label class="dialog__field">
        <span>Название группы</span>
        <input id="group-name" type="text" placeholder="Например, Работа" required maxlength="30">
      </label>
      <div class="dialog__buttons">
        <button type="button" id="group-cancel" class="btn btn--ghost">Отмена</button>
        <button type="submit" class="btn btn--primary">Сохранить</button>
      </div>
    </form>
  </dialog>

  <!-- Диалог настроек вида -->
  <dialog id="settings-dialog" class="dialog">
    <form id="settings-form" method="dialog" class="dialog__form">
      <h2 class="dialog__heading">Настройки вида</h2>

      <label class="dialog__field">
        <span>Колонок: <output id="cols-output"></output></span>
        <input id="set-columns" type="range" min="2" max="8" step="1">
      </label>

      <label class="dialog__field">
        <span>Ширина плитки: <output id="width-output"></output></span>
        <input id="set-width" type="range" min="80" max="360" step="5">
      </label>

      <label class="dialog__field">
        <span>Высота плитки: <output id="height-output"></output></span>
        <input id="set-height" type="range" min="70" max="320" step="5">
      </label>

      <label class="dialog__field dialog__field--row">
        <input id="set-follow-theme" type="checkbox">
        <span>Подстраивать фон под системную тему</span>
      </label>

      <label class="dialog__field">
        <span>Цвет фона</span>
        <input id="set-bg-color" type="color">
      </label>

      <label class="dialog__field">
        <span>Фоновая картинка (URL, необязательно)</span>
        <input id="set-bg-image" type="url" placeholder="https://...jpg">
      </label>

      <div class="dialog__buttons">
        <button type="button" id="settings-reset" class="btn btn--ghost">Сбросить</button>
        <button type="submit" class="btn btn--primary">Готово</button>
      </div>
    </form>
  </dialog>

  <script src="newtab.js"></script>
</body>
</html>
